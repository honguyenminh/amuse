name: Reusable frontend app publish

on:
  workflow_call:
    inputs:
      image:
        description: GHCR image name without registry (e.g. amuse-consumer)
        required: true
        type: string
      dockerfile:
        description: Dockerfile path relative to repo root
        required: true
        type: string
      source_sha:
        description: Git commit SHA to build and label
        required: true
        type: string
      head_branch:
        description: Branch name for default floating tag
        required: true
        type: string
      trigger_event:
        description: push, pull_request, or workflow_dispatch
        required: true
        type: string
      pr_number:
        description: PR number when trigger_event is pull_request
        required: false
        type: string
        default: ""
      image_tag_override:
        description: Optional floating tag override (workflow_dispatch)
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  publish:
    name: Publish ${{ inputs.image }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.source_sha }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v3.9.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
          TRIGGER_EVENT: ${{ inputs.trigger_event }}
          PR_NUMBER: ${{ inputs.pr_number }}
          IMAGE_TAG_OVERRIDE: ${{ inputs.image_tag_override }}
          IMAGE: ${{ inputs.image }}
        run: |
          SHORT_SHA="${SOURCE_SHA:0:7}"
          if [ -n "${IMAGE_TAG_OVERRIDE}" ]; then
            FLOATING_TAG="${IMAGE_TAG_OVERRIDE}"
          elif [ "${TRIGGER_EVENT}" = "pull_request" ] && [ -n "${PR_NUMBER}" ]; then
            FLOATING_TAG="pr-${PR_NUMBER}"
          else
            FLOATING_TAG="${HEAD_BRANCH}"
          fi
          case "${FLOATING_TAG}" in
            master|pr-*)
              API_URL="https://api.skynet-beta.m8.io.vn"
              ;;
            staging)
              API_URL="https://api.amuse.m8.io.vn"
              ;;
            production)
              API_URL="https://api.amuse.local"
              ;;
            *)
              API_URL="https://api.example.com"
              ;;
          esac
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "floating_tag=${FLOATING_TAG}" >> "$GITHUB_OUTPUT"
          echo "api_base_url=${API_URL}" >> "$GITHUB_OUTPUT"
          echo "scan_tag=ghcr.io/${{ github.repository_owner }}/${IMAGE}:scan-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "push_tags=ghcr.io/${{ github.repository_owner }}/${IMAGE}:${FLOATING_TAG},ghcr.io/${{ github.repository_owner }}/${IMAGE}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6.15.0
        with:
          context: frontend
          file: ${{ inputs.dockerfile }}
          load: true
          push: false
          tags: ${{ steps.tags.outputs.scan_tag }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ steps.tags.outputs.api_base_url }}
          labels: |
            org.opencontainers.image.revision=${{ steps.tags.outputs.source_sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ inputs.image }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.tags.outputs.scan_tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          scanners: vuln
          ignore-unfixed: true
          limit-severities-for-sarif: true
          exit-code: 1
          trivy-config: trivy.yaml

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ inputs.image }}

      - name: Push image
        if: success()
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6.15.0
        with:
          context: frontend
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.push_tags }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ steps.tags.outputs.api_base_url }}
          labels: |
            org.opencontainers.image.revision=${{ steps.tags.outputs.source_sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ inputs.image }}
