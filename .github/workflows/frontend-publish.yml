name: Frontend Publish

on:
  workflow_run:
    workflows:
      - Backend CI
    types:
      - completed
    branches:
      - master
      - staging
      - production
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  publish:
    name: Publish frontend images
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        (
          (
            github.event.workflow_run.event == 'push' &&
            contains(fromJSON('["master","staging","production"]'), github.event.workflow_run.head_branch)
          ) ||
          (
            github.event.workflow_run.event == 'pull_request' &&
            github.event.workflow_run.pull_requests[0].base.ref == 'master'
          )
        )
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: amuse-consumer
            dockerfile: frontend/consumer/Dockerfile
          - image: amuse-business
            dockerfile: frontend/business/Dockerfile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v3.9.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${GITHUB_SHA}"
            BRANCH="${GITHUB_REF_NAME}"
            EVENT="push"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            EVENT="${{ github.event.workflow_run.event }}"
          fi
          SHORT_SHA="${SHA:0:7}"
          if [ "${EVENT}" = "pull_request" ]; then
            FLOATING_TAG="pr-${{ github.event.workflow_run.pull_requests[0].number }}"
          else
            FLOATING_TAG="${BRANCH}"
          fi
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "floating_tag=${FLOATING_TAG}" >> "$GITHUB_OUTPUT"
          echo "push_tags=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${FLOATING_TAG},ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6.15.0
        with:
          context: frontend
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.push_tags }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.example.com
