name: Frontend CI

on:
  pull_request:
    branches:
      - master
      - staging
      - production
    paths:
      - frontend/**
  push:
    branches:
      - master
      - staging
      - production
    paths:
      - frontend/**

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            frontend/consumer/pnpm-lock.yaml
            frontend/business/pnpm-lock.yaml

      - name: Lint consumer
        working-directory: frontend/consumer
        run: |
          pnpm install --frozen-lockfile
          pnpm exec tsc --noEmit
          pnpm run check:colors

      - name: Lint business
        working-directory: frontend/business
        run: |
          pnpm install --frozen-lockfile
          pnpm exec tsc --noEmit

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/consumer/pnpm-lock.yaml

      - name: Test consumer
        working-directory: frontend/consumer
        run: |
          pnpm install --frozen-lockfile
          pnpm test

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: https://api.example.com
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            frontend/consumer/pnpm-lock.yaml
            frontend/business/pnpm-lock.yaml

      - name: Build consumer
        working-directory: frontend/consumer
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build business
        working-directory: frontend/business
        run: |
          pnpm install --frozen-lockfile
          pnpm build

  docker-verify:
    name: Docker verify
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build consumer image
        run: docker build -f frontend/consumer/Dockerfile frontend

      - name: Build business image
        run: docker build -f frontend/business/Dockerfile frontend
