name: Reusable frontend app CI

on:
  workflow_call:
    inputs:
      app_dir:
        description: App directory under frontend/ (consumer or business)
        required: true
        type: string
      dockerfile:
        description: Dockerfile path relative to repo root
        required: true
        type: string
      run_unit_tests:
        description: Run pnpm test after lint
        required: false
        type: boolean
        default: false
      extra_lint_script:
        description: Optional package.json script to run after typecheck (e.g. check:colors)
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: frontend/${{ inputs.app_dir }}/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/${{ inputs.app_dir }}/pnpm-lock.yaml

      - name: Typecheck
        working-directory: frontend/${{ inputs.app_dir }}
        run: |
          pnpm install --frozen-lockfile
          pnpm exec tsc --noEmit

      - name: Extra lint
        if: inputs.extra_lint_script != ''
        working-directory: frontend/${{ inputs.app_dir }}
        run: pnpm run ${{ inputs.extra_lint_script }}

      - name: Unit tests
        if: inputs.run_unit_tests
        working-directory: frontend/${{ inputs.app_dir }}
        run: pnpm test

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: https://api.example.com
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: frontend/${{ inputs.app_dir }}/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/${{ inputs.app_dir }}/pnpm-lock.yaml

      # https://nextjs.org/docs/app/guides/ci-build-caching#github-actions
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: frontend/${{ inputs.app_dir }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ inputs.app_dir }}-${{ hashFiles(format('frontend/{0}/pnpm-lock.yaml', inputs.app_dir), 'frontend/packages/catalog-text/package.json') }}-${{ hashFiles(format('frontend/{0}/**/*.js', inputs.app_dir), format('frontend/{0}/**/*.jsx', inputs.app_dir), format('frontend/{0}/**/*.ts', inputs.app_dir), format('frontend/{0}/**/*.tsx', inputs.app_dir), 'frontend/packages/catalog-text/**/*.js', 'frontend/packages/catalog-text/**/*.jsx', 'frontend/packages/catalog-text/**/*.ts', 'frontend/packages/catalog-text/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ inputs.app_dir }}-${{ hashFiles(format('frontend/{0}/pnpm-lock.yaml', inputs.app_dir), 'frontend/packages/catalog-text/package.json') }}-

      - name: Build
        working-directory: frontend/${{ inputs.app_dir }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build

  docker-verify:
    name: Docker verify
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build image
        run: docker build -f ${{ inputs.dockerfile }} frontend
