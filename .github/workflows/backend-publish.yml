name: Backend Publish

on:
  workflow_run:
    workflows:
      - Backend CI
    types:
      - completed
    branches:
      - master
      - staging
      - production

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  publish:
    name: Publish images
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (
        (
          github.event.workflow_run.event == 'push' &&
          contains(fromJSON('["master","staging","production"]'), github.event.workflow_run.head_branch)
        ) ||
        (
          github.event.workflow_run.event == 'pull_request' &&
          github.event.workflow_run.pull_requests[0].base.ref == 'master'
        )
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: amuse-api
            context: backend/src
            dockerfile: backend/src/Amuse.Api/Dockerfile
          - image: amuse-worker-transcoder
            context: backend/src
            dockerfile: backend/src/Amuse.Worker.Transcoder/Dockerfile
          - image: amuse-worker-scheduler
            context: backend/src
            dockerfile: backend/src/Amuse.Worker.Scheduler/Dockerfile
          - image: amuse-migrate
            context: backend
            dockerfile: backend/Dockerfile.migrate
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v3.9.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          EVENT="${{ github.event.workflow_run.event }}"
          if [ "${EVENT}" = "pull_request" ]; then
            FLOATING_TAG="pr-${{ github.event.workflow_run.pull_requests[0].number }}"
          else
            FLOATING_TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "floating_tag=${FLOATING_TAG}" >> "$GITHUB_OUTPUT"
          echo "scan_tag=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:scan-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "push_tags=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${FLOATING_TAG},ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6.15.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ steps.tags.outputs.scan_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.tags.outputs.scan_tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.image }}

      - name: Push image
        if: success()
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6.15.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.push_tags }}
          labels: |
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.image }}
