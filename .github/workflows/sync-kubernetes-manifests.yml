name: Sync Kubernetes Manifests

on:
  push:
    branches:
      - master
    paths:
      - infrastructure/kubernetes/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync to amuse-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout amuse-deploy
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: honguyenminh/amuse-deploy
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: amuse-deploy

      - name: Rsync manifest structure
        run: |
          rsync -av --delete \
            --exclude 'images-tags/' \
            --exclude 'secrets.yaml' \
            --exclude 'secrets.example.yaml' \
            infrastructure/kubernetes/base/ \
            amuse-deploy/base/
          rsync -av --delete \
            --exclude 'images-tags/' \
            --exclude 'secrets.yaml' \
            --exclude 'secrets.example.yaml' \
            --exclude 'cluster.env' \
            infrastructure/kubernetes/overlays/ \
            amuse-deploy/overlays/
          # Dev secrets are cluster-local; drop any legacy GitOps copies from the deploy repo.
          rm -f amuse-deploy/overlays/dev/secrets-argo-patch.yaml

      - name: Commit and push
        working-directory: amuse-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add base overlays
          if git diff --staged --quiet; then
            echo "No manifest changes to sync."
            exit 0
          fi
          git commit -m "sync: kubernetes manifests from amuse@${GITHUB_SHA:0:7}"
          git push
