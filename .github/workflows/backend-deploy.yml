name: Backend Deploy

on:
  workflow_run:
    workflows:
      - Backend Publish
      - Frontend Consumer Publish
      - Frontend Business Publish
    types:
      - completed
    branches:
      - master
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Image tag override (default is the environment branch tag)
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy-development:
    name: Deploy development
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      contains(fromJSON('["Backend Publish","Frontend Consumer Publish","Frontend Business Publish"]'), github.event.workflow_run.name) &&
      (
        (
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'master'
        ) ||
        (
          github.event.workflow_run.event == 'pull_request' &&
          github.event.workflow_run.pull_requests[0].base.ref == 'master'
        )
      )
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Resolve image tag
        id: params
        run: |
          EVENT="${{ github.event.workflow_run.event }}"
          if [ "${EVENT}" = "pull_request" ]; then
            TAG="pr-${{ github.event.workflow_run.pull_requests[0].number }}"
          else
            TAG="master"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "images_path=overlays/dev/images-tags/kustomization.yaml" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: honguyenminh/amuse-deploy
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: amuse-deploy

      - name: Resolve images to bump
        id: images
        env:
          PUBLISH_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: |
          case "${PUBLISH_WORKFLOW}" in
            "Backend Publish")
              IMAGES="amuse-api amuse-worker-transcoder amuse-worker-scheduler amuse-migrate"
              ;;
            "Frontend Consumer Publish")
              IMAGES="amuse-consumer"
              ;;
            "Frontend Business Publish")
              IMAGES="amuse-business"
              ;;
            *)
              echo "Unsupported publish workflow: ${PUBLISH_WORKFLOW}" >&2
              exit 1
              ;;
          esac
          echo "names=${IMAGES}" >> "$GITHUB_OUTPUT"

      - name: Bump image tags in amuse-deploy
        working-directory: amuse-deploy
        run: |
          python3 <<'PY'
          import os, pathlib, re
          path = pathlib.Path("${{ steps.params.outputs.images_path }}")
          tag = "${{ steps.params.outputs.image_tag }}"
          owner = "${{ github.repository_owner }}"
          images = "${{ steps.images.outputs.names }}".split()
          text = path.read_text()
          for image in images:
              text = re.sub(
                  rf"(name: ghcr\.io/{re.escape(owner)}/{re.escape(image)}\n\s+newTag: ).*",
                  rf"\g<1>{tag}",
                  text,
              )
          path.write_text(text)
          PY

      - name: Commit and push
        working-directory: amuse-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.params.outputs.images_path }}"
          if git diff --staged --quiet; then
            echo "No image tag changes to commit."
            exit 0
          fi
          git commit -m "deploy(dev): bump ${{ steps.images.outputs.names }} to ${{ steps.params.outputs.image_tag }}"
          git push

  deploy-staging:
    name: Deploy staging
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      contains(fromJSON('["Backend Publish","Frontend Consumer Publish","Frontend Business Publish"]'), github.event.workflow_run.name) &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Resolve image tag
        id: params
        run: |
          echo "image_tag=staging" >> "$GITHUB_OUTPUT"
          echo "images_path=overlays/stage/images-tags/kustomization.yaml" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: honguyenminh/amuse-deploy
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: amuse-deploy

      - name: Resolve images to bump
        id: images
        env:
          PUBLISH_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: |
          case "${PUBLISH_WORKFLOW}" in
            "Backend Publish")
              IMAGES="amuse-api amuse-worker-transcoder amuse-worker-scheduler amuse-migrate"
              ;;
            "Frontend Consumer Publish")
              IMAGES="amuse-consumer"
              ;;
            "Frontend Business Publish")
              IMAGES="amuse-business"
              ;;
            *)
              echo "Unsupported publish workflow: ${PUBLISH_WORKFLOW}" >&2
              exit 1
              ;;
          esac
          echo "names=${IMAGES}" >> "$GITHUB_OUTPUT"

      - name: Bump image tags in amuse-deploy
        working-directory: amuse-deploy
        run: |
          python3 <<'PY'
          import os, pathlib, re
          path = pathlib.Path("${{ steps.params.outputs.images_path }}")
          tag = "${{ steps.params.outputs.image_tag }}"
          owner = "${{ github.repository_owner }}"
          images = "${{ steps.images.outputs.names }}".split()
          text = path.read_text()
          for image in images:
              text = re.sub(
                  rf"(name: ghcr\.io/{re.escape(owner)}/{re.escape(image)}\n\s+newTag: ).*",
                  rf"\g<1>{tag}",
                  text,
              )
          path.write_text(text)
          PY

      - name: Commit and push
        working-directory: amuse-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.params.outputs.images_path }}"
          if git diff --staged --quiet; then
            echo "No image tag changes to commit."
            exit 0
          fi
          git commit -m "deploy(staging): bump ${{ steps.images.outputs.names }} to ${{ steps.params.outputs.image_tag }}"
          git push

  deploy-manual:
    name: Deploy ${{ inputs.environment }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Resolve deploy parameters
        id: params
        run: |
          ENV="${{ inputs.environment }}"
          case "${ENV}" in
            staging)
              TAG="${{ inputs.image_tag }}"
              if [ -z "${TAG}" ]; then TAG="staging"; fi
              IMAGES_PATH="overlays/stage/images-tags/kustomization.yaml"
              ;;
            production)
              echo "Production overlay not yet defined." >&2
              exit 1
              ;;
            *)
              echo "Unsupported environment: ${ENV}" >&2
              exit 1
              ;;
          esac
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "images_path=${IMAGES_PATH}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: honguyenminh/amuse-deploy
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: amuse-deploy

      - name: Bump image tags in amuse-deploy
        working-directory: amuse-deploy
        run: |
          python3 <<'PY'
          import pathlib, re
          path = pathlib.Path("${{ steps.params.outputs.images_path }}")
          tag = "${{ steps.params.outputs.image_tag }}"
          owner = "${{ github.repository_owner }}"
          text = path.read_text()
          for image in [
              "amuse-api",
              "amuse-worker-transcoder",
              "amuse-worker-scheduler",
              "amuse-migrate",
              "amuse-consumer",
              "amuse-business",
          ]:
              text = re.sub(
                  rf"(name: ghcr\.io/{re.escape(owner)}/{re.escape(image)}\n\s+newTag: ).*",
                  rf"\g<1>{tag}",
                  text,
              )
          path.write_text(text)
          PY

      - name: Commit and push
        working-directory: amuse-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.params.outputs.images_path }}"
          if git diff --staged --quiet; then
            echo "No image tag changes to commit."
            exit 0
          fi
          git commit -m "deploy(${{ inputs.environment }}): bump images to ${{ steps.params.outputs.image_tag }}"
          git push
