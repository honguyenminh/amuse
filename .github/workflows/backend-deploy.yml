name: Backend Deploy

on:
  workflow_run:
    workflows:
      - Backend Publish
    types:
      - completed
    branches:
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Image tag override (default is the environment branch tag)
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy-development:
    name: Deploy development
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      (
        (
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'master'
        ) ||
        (
          github.event.workflow_run.event == 'pull_request' &&
          github.event.workflow_run.pull_requests[0].base.ref == 'master'
        )
      )
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Echo deploy plan
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          SHORT_SHA: ${{ github.event.workflow_run.head_sha }}
          CI_EVENT: ${{ github.event.workflow_run.event }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          ENVIRONMENT: development
          DATABASE: amuse_development
          OWNER: ${{ github.repository_owner }}
        run: |
          SHORT_SHA="${SHORT_SHA:0:7}"
          if [ "${CI_EVENT}" = "pull_request" ]; then
            IMAGE_TAG="pr-${PR_NUMBER}"
            SOURCE="PR #${PR_NUMBER} (${HEAD_BRANCH} -> master)"
          else
            IMAGE_TAG="master"
            SOURCE="push to master"
          fi
          echo "=== Backend deploy (phase 1 echo stub) ==="
          echo "Environment: ${ENVIRONMENT}"
          echo "Source: ${SOURCE}"
          echo "Git SHA: ${SHA}"
          echo "Image tag: ${IMAGE_TAG} (sha-${SHORT_SHA} also available)"
          echo "Database: ${DATABASE}"
          echo ""
          echo "Step 1: Run Job ghcr.io/${OWNER}/amuse-migrate:${IMAGE_TAG} against ${DATABASE}"
          echo "Step 2: Roll Deployment ghcr.io/${OWNER}/amuse-api:${IMAGE_TAG}"
          echo "Step 3: Roll Deployment ghcr.io/${OWNER}/amuse-worker-transcoder:${IMAGE_TAG}"
          echo "Step 4: Roll Deployment ghcr.io/${OWNER}/amuse-worker-scheduler:${IMAGE_TAG}"
          echo ""
          echo "Next step (phase 2): wire kubeconfig + Helm/Kustomize apply"

  deploy-manual:
    name: Deploy ${{ inputs.environment }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve deploy parameters
        id: params
        run: |
          ENV="${{ inputs.environment }}"
          case "${ENV}" in
            staging)
              TAG="${{ inputs.image_tag }}"
              if [ -z "${TAG}" ]; then TAG="staging"; fi
              DB="amuse_staging"
              ;;
            production)
              TAG="${{ inputs.image_tag }}"
              if [ -z "${TAG}" ]; then TAG="production"; fi
              DB="amuse_production"
              ;;
            *)
              echo "Unsupported environment: ${ENV}" >&2
              exit 1
              ;;
          esac
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "database=${DB}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Echo deploy plan
        env:
          ENVIRONMENT: ${{ steps.params.outputs.environment }}
          IMAGE_TAG: ${{ steps.params.outputs.image_tag }}
          DATABASE: ${{ steps.params.outputs.database }}
          SHORT_SHA: ${{ steps.params.outputs.short_sha }}
          OWNER: ${{ github.repository_owner }}
        run: |
          echo "=== Backend deploy (phase 1 echo stub) ==="
          echo "Environment: ${ENVIRONMENT}"
          echo "Git SHA: ${GITHUB_SHA}"
          echo "Image tag: ${IMAGE_TAG} (sha-${SHORT_SHA} also available)"
          echo "Database: ${DATABASE}"
          echo ""
          echo "Step 1: Run Job ghcr.io/${OWNER}/amuse-migrate:${IMAGE_TAG} against ${DATABASE}"
          echo "Step 2: Roll Deployment ghcr.io/${OWNER}/amuse-api:${IMAGE_TAG}"
          echo "Step 3: Roll Deployment ghcr.io/${OWNER}/amuse-worker-transcoder:${IMAGE_TAG}"
          echo "Step 4: Roll Deployment ghcr.io/${OWNER}/amuse-worker-scheduler:${IMAGE_TAG}"
          echo ""
          echo "Next step (phase 2): wire kubeconfig + Helm/Kustomize apply"
