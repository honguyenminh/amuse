name: Backend Deploy

on:
  workflow_run:
    workflows:
      - Backend Publish
      - Frontend Publish
    types:
      - completed
    branches:
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Image tag override (default is the environment branch tag)
        required: false
        type: string

permissions:
  contents: write

jobs:
  deploy-development:
    name: Deploy development
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      contains(fromJSON('["Backend Publish","Frontend Publish"]'), github.event.workflow_run.name) &&
      (
        (
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'master'
        ) ||
        (
          github.event.workflow_run.event == 'pull_request' &&
          github.event.workflow_run.pull_requests[0].base.ref == 'master'
        )
      )
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: params
        run: |
          EVENT="${{ github.event.workflow_run.event }}"
          if [ "${EVENT}" = "pull_request" ]; then
            TAG="pr-${{ github.event.workflow_run.pull_requests[0].number }}"
          else
            TAG="master"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "overlay_path=infrastructure/kubernetes/overlays/dev" >> "$GITHUB_OUTPUT"

      - name: Bump Kustomize image tags (GitOps)
        run: |
          python3 <<'PY'
          import pathlib, re
          overlay = pathlib.Path("${{ steps.params.outputs.overlay_path }}")
          tag = "${{ steps.params.outputs.image_tag }}"
          owner = "${{ github.repository_owner }}"
          path = overlay / "kustomization.yaml"
          text = path.read_text()
          for image in ["amuse-api", "amuse-worker-transcoder", "amuse-worker-scheduler", "amuse-migrate", "amuse-consumer", "amuse-business"]:
              text = re.sub(
                  rf"(name: ghcr\.io/{re.escape(owner)}/{re.escape(image)}\n\s+newTag: ).*",
                  rf"\g<1>{tag}",
                  text,
              )
          path.write_text(text)
          PY

      - name: Commit and push GitOps manifest bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infrastructure/kubernetes/overlays/dev/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "deploy(dev): bump images to ${{ steps.params.outputs.image_tag }}"
          git push

  deploy-manual:
    name: Deploy ${{ inputs.environment }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve deploy parameters
        id: params
        run: |
          ENV="${{ inputs.environment }}"
          case "${ENV}" in
            staging)
              TAG="${{ inputs.image_tag }}"
              if [ -z "${TAG}" ]; then TAG="staging"; fi
              OVERLAY="infrastructure/kubernetes/overlays/stage"
              ;;
            production)
              echo "Production overlay not yet defined." >&2
              exit 1
              ;;
            *)
              echo "Unsupported environment: ${ENV}" >&2
              exit 1
              ;;
          esac
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "overlay_path=${OVERLAY}" >> "$GITHUB_OUTPUT"

      - name: Bump Kustomize image tags (GitOps)
        run: |
          OVERLAY="${{ steps.params.outputs.overlay_path }}"
          TAG="${{ steps.params.outputs.image_tag }}"
          python3 <<'PY'
          import pathlib, re
          overlay = pathlib.Path("${{ steps.params.outputs.overlay_path }}")
          tag = "${{ steps.params.outputs.image_tag }}"
          owner = "${{ github.repository_owner }}"
          path = overlay / "kustomization.yaml"
          text = path.read_text()
          for image in ["amuse-api", "amuse-worker-transcoder", "amuse-worker-scheduler", "amuse-migrate", "amuse-consumer", "amuse-business"]:
              text = re.sub(
                  rf"(name: ghcr\.io/{re.escape(owner)}/{re.escape(image)}\n\s+newTag: ).*",
                  rf"\g<1>{tag}",
                  text,
              )
          path.write_text(text)
          PY

      - name: Commit and push GitOps manifest bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.params.outputs.overlay_path }}/kustomization.yaml"
          if git diff --staged --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "deploy(${{ inputs.environment }}): bump images to ${{ steps.params.outputs.image_tag }}"
          git push
