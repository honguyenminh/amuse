services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: amuse_development
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amuse_development"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: amuse
      MINIO_ROOT_PASSWORD: amuse_dev_secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: amuse
      RABBITMQ_DEFAULT_PASS: amuse_dev_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.8-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "amuse_dev_secret"]
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a amuse_dev_secret ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot init: ensures the public covers bucket and the private audio bucket
  # exist with the correct anonymous-read policy on covers. Idempotent.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 amuse amuse_dev_secret &&
      mc admin config set local api
        cors_allow_origin='*'
        cors_allow_methods='GET,HEAD,PUT'
        cors_allow_headers='Authorization,Content-Type,Range,Origin,Accept,Cache-Control,If-Modified-Since,If-None-Match'
        cors_expose_headers='ETag,Accept-Ranges,Content-Length,Content-Range,Content-Type' &&
      mc admin service restart --json --quiet local &&
      mc mb --ignore-existing local/amuse-covers &&
      mc mb --ignore-existing local/amuse-audio &&
      mc anonymous set download local/amuse-covers &&
      echo 'minio buckets ready (global API CORS configured).'
      "
    restart: "no"

  # One-shot: applies EF migrations before the API starts. Idempotent.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  amuse.api:
    image: amuse.api
    build:
      context: src
      args:
        BUILD_CONFIGURATION: Debug
      dockerfile: Amuse.Api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=amuse_development;Username=postgres;Password=postgres
      Media__Endpoint: http://minio:9000
      # Browser-facing URLs must use localhost, not the in-compose hostname.
      Media__PublicBaseUrl: http://localhost:9000
      Media__AccessKey: amuse
      Media__SecretKey: amuse_dev_secret
      Media__ForcePathStyle: "true"
      Media__CoversBucket: amuse-covers
      Media__AudioBucket: amuse-audio
      Media__SignedUrlMinutes: "30"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: amuse
      RabbitMq__Password: amuse_dev_secret
      RabbitMq__QueueName: amuse.transcode.jobs
      RabbitMq__PrefetchCount: "1"
      Redis__ConnectionString: "redis:6379,password=amuse_dev_secret,abortConnect=false"
      Identity__Email__Smtp__Enabled: "true"
      Identity__Email__Smtp__Host: mailpit
      Identity__Email__Smtp__Port: "1025"
      Identity__Email__Smtp__UseSsl: "false"
      Identity__Email__Smtp__FromAddress: noreply@amuse.local
      Identity__Email__Smtp__FromName: Amuse
    ports:
      - "5000:8080"

  amuse.worker.transcoder:
    image: amuse.worker.transcoder
    build:
      context: src
      args:
        BUILD_CONFIGURATION: Debug
      dockerfile: Amuse.Worker.Transcoder/Dockerfile
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=amuse_development;Username=postgres;Password=postgres
      Media__Endpoint: http://minio:9000
      Media__PublicBaseUrl: http://localhost:9000
      Media__AccessKey: amuse
      Media__SecretKey: amuse_dev_secret
      Media__ForcePathStyle: "true"
      Media__CoversBucket: amuse-covers
      Media__AudioBucket: amuse-audio
      Media__SignedUrlMinutes: "30"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: amuse
      RabbitMq__Password: amuse_dev_secret
      RabbitMq__QueueName: amuse.transcode.jobs
      RabbitMq__PrefetchCount: "1"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  amuse.worker.scheduler:
    image: amuse.worker.scheduler
    build:
      context: src
      args:
        BUILD_CONFIGURATION: Debug
      dockerfile: Amuse.Worker.Scheduler/Dockerfile
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=amuse_development;Username=postgres;Password=postgres
      CatalogScheduler__PollIntervalSeconds: "60"
      CatalogScheduler__BatchSize: "50"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  minio-data:
  postgres-data:
  redis-data:
